spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://school-management-system.onrender.com,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}
