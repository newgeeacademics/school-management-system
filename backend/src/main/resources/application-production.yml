spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

app:
  seed:
    enabled: false
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  cors:
    # Comma-separated frontend origins (Vercel URLs). No spaces unless trimmed. Example:
    # https://school-management-system-ivory-seven.vercel.app,https://newgee-admin.vercel.app,https://newgee-portal.vercel.app
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://www.newgeeacademy.com,https://newgeeacademy.com,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5179}
  public:
    main-url: ${APP_MAIN_URL:https://www.newgeeacademy.com}
    portal-url: ${APP_PORTAL_URL:https://portal.newgeeacademy.com}
  email:
    enabled: ${APP_EMAIL_ENABLED:true}
    from: ${APP_EMAIL_FROM:NewGee <contact@newgeeacademy.com>}
    subject-prefix: ${APP_EMAIL_SUBJECT_PREFIX:[NewGee]}
    provider: ${APP_EMAIL_PROVIDER:brevo}
    logo-url: ${APP_EMAIL_LOGO_URL:}
  brevo:
    api-key: ${BREVO_API_KEY:}

  reports:
    daily:
      enabled: ${APP_DAILY_REPORT_ENABLED:true}
      recipient: ${APP_DAILY_REPORT_RECIPIENT:newgeeacademics@gmail.com}
      cron: "0 0 0 * * *"
      zone: GMT

spring.mail.host: ${MAIL_HOST:}
spring.mail.port: ${MAIL_PORT:587}
spring.mail.username: ${MAIL_USERNAME:}
spring.mail.password: ${MAIL_PASSWORD:}
