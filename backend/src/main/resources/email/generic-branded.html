<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:24px;background:#eff6ff;font-family:'Segoe UI',Roboto,Arial,sans-serif;">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;padding:24px;border:1px solid #e2e8f0;">
    <img src="{{logoUrl}}" alt="NewGee" width="40" height="40" style="display:block;margin-bottom:12px;">
    <h1 style="margin:0 0 12px 0;font-size:20px;color:#2563eb;">{{subject}}</h1>
    <p style="margin:0;font-size:14px;color:#334155;line-height:1.6;">{{body}}</p>
    <p style="margin:20px 0 0 0;font-size:12px;color:#94a3b8;">© {{year}} NewGee</p>
  </div>
</body>
</html>
