<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenue sur NewGee</title>
</head>
<body style="margin:0;padding:0;background-color:#eff6ff;font-family:'Segoe UI',Roboto,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eff6ff;padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(37,99,235,0.15);">
          <tr>
            <td style="padding:28px 28px 12px 28px;text-align:center;background-color:#ffffff;">
              <img src="{{logoUrl}}" alt="NewGee" width="48" height="48" style="display:block;margin:0 auto;">
              <p style="margin:14px 0 0 0;font-size:22px;font-weight:700;color:#2563eb;letter-spacing:-0.03em;">NewGee</p>
              <p style="margin:8px 0 0 0;font-size:13px;color:#64748b;">Gestion scolaire</p>
            </td>
          </tr>
          <tr>
            <td style="background-color:#2563eb;padding:26px 28px;text-align:center;">
              <p style="margin:0;font-size:14px;font-weight:700;color:rgba(255,255,255,0.9);text-transform:uppercase;letter-spacing:0.12em;">Inscription confirmée</p>
              <p style="margin:10px 0 0 0;font-size:22px;font-weight:700;color:#ffffff;line-height:1.2;">Bonjour {{displayName}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 28px;background-color:#ffffff;">
              <p style="margin:0 0 16px 0;font-size:15px;color:#334155;line-height:1.65;">
                Votre établissement est prêt. Vous pouvez configurer vos classes, enseignants, élèves et services depuis le tableau de bord.
              </p>
              <div style="text-align:center;margin:28px 0 8px 0;">
                <a href="{{appUrl}}" style="display:inline-block;padding:14px 32px;background-color:#2563eb;color:#ffffff;text-decoration:none;border-radius:10px;font-size:15px;font-weight:700;">Accéder au tableau de bord</a>
              </div>
              <p style="margin:24px 0 0 0;font-size:14px;color:#334155;">Cordialement,<br><strong>L'équipe NewGee</strong></p>
            </td>
          </tr>
          <tr>
            <td style="padding:22px 28px;text-align:center;background-color:#ffffff;border-top:1px solid #e2e8f0;">
              <p style="margin:0;font-size:12px;color:#94a3b8;">© {{year}} NewGee — Tous droits réservés</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
