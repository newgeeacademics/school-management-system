spring:
  application:
    name: classroom-backend

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

  # Default profile uses H2 in-memory database for easy development
  datasource:
    url: jdbc:h2:mem:classroomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# JWT Configuration
app:
  uploads:
    evaluation-dir: uploads/evaluations

  # Set APP_SEED_ENABLED=true to load demo school/users on empty database (dev only).
  seed:
    enabled: ${APP_SEED_ENABLED:false}

  jwt:
    secret: classroom-secret-key-change-in-production-min-256-bits-long-key-here
    expiration-ms: 86400000  # 24 hours

  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5179,http://localhost:3000

  public:
    main-url: ${APP_MAIN_URL:http://localhost:5173}
    portal-url: ${APP_PORTAL_URL:http://localhost:5174}

  email:
    enabled: ${APP_EMAIL_ENABLED:true}
    from: ${APP_EMAIL_FROM:NewGee <contact@newgeeacademy.com>}
    subject-prefix: ${APP_EMAIL_SUBJECT_PREFIX:[NewGee]}
    provider: ${APP_EMAIL_PROVIDER:brevo}
    logo-url: ${APP_EMAIL_LOGO_URL:}

  brevo:
    api-key: ${BREVO_API_KEY:}

spring.mail.host: ${MAIL_HOST:}
spring.mail.port: ${MAIL_PORT:587}
spring.mail.username: ${MAIL_USERNAME:}
spring.mail.password: ${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth: true
spring.mail.properties.mail.smtp.starttls.enable: true
spring.mail.properties.mail.smtp.starttls.required: true

---
# PostgreSQL profile (activate with --spring.profiles.active=postgres)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/classroomdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
