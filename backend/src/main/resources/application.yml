spring:
  application:
    name: classroom-backend

  # Default profile uses H2 in-memory database for easy development
  datasource:
    url: jdbc:h2:mem:classroomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: classroom-secret-key-change-in-production-min-256-bits-long-key-here
    expiration-ms: 86400000  # 24 hours

# CORS
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

---
# PostgreSQL profile (activate with --spring.profiles.active=postgres)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/classroomdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
