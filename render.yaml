# Render Blueprint — deploy from GitHub: Dashboard → New → Blueprint → connect repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: classroom-backend
    runtime: docker
    branch: it
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      # Copy from Neon console → Connection string (pooler, with sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Render can auto-generate a secure secret
      - key: APP_JWT_SECRET
        generateValue: true
      # Comma-separated frontend URLs (update after deploying frontends on Render/Vercel)
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      # Public app URLs (used in transactional email links)
      - key: APP_MAIN_URL
        value: https://school-management-system-ivory-seven.vercel.app
      - key: APP_PORTAL_URL
        value: https://school-management-system-portal.vercel.app
      # Brevo transactional email (https://app.brevo.com → SMTP & API → API keys)
      - key: APP_EMAIL_ENABLED
        value: "true"
      - key: APP_EMAIL_PROVIDER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: APP_EMAIL_FROM
        value: NewGee <contact@newgeeacademy.com>
      - key: APP_EMAIL_SUBJECT_PREFIX
        value: "[NewGee]"
