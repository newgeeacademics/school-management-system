# Render Blueprint — deploy from GitHub: Dashboard → New → Blueprint → connect repo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: classroom-backend
    runtime: docker
    branch: it
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      # Copy from Neon console → Connection string (pooler, with sslmode=require)
      - key: DATABASE_URL
        sync: false
      # Render can auto-generate a secure secret
      - key: APP_JWT_SECRET
        generateValue: true
      # Comma-separated frontend URLs (update after deploying frontends on Render/Vercel)
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
